name: Dependent Job
on:
  push:
    branches:
      - main

jobs:
  first_job:
    name: first job
    runs-on: ubuntu-latest
    steps:
      - name: Dump Job Information
        env:
          CONTEXT_ITEM: ${{ toJson(job) }}
        run: |
          echo "$(CONTEXT_ITEM)"
          echo "*********************"
          echo "*********************"
          echo "*********************"
  second_job:
    name: second job
    runs-on: ubuntu-latest
    needs: first_job
    steps:
      - name: Dump Job Information
        env:
          CONTEXT_ITEM: ${{ toJson(job) }}
        run: |
          echo "$(CONTEXT_ITEM)"
          echo "*********************"
          echo "*********************"
          echo "*********************"
  third_job:
    name: Third Job (Parallel)
    runs-on: ubuntu-latest
    steps:
      - name: Dump Job Information
        env:
          CONTEXT_ITEM: ${{ toJson(job) }}
        run: |
          echo "${CONTEXT_ITEM}"
          echo "*********************"
          echo "*********************"
          echo "*********************"